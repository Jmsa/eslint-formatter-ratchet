name: Run tests

on:
  pull_request:
    types:
      - opened
      - reopend
      - synchronize
    branches:
      - "**"
  workflow_dispatch:

jobs:
  scheduled:
    runs-on: ubuntu-latest
    env:
      CACHE_NAME: cache-node-modules
      NODE_OPTIONS: --max_old_space_size=4096
    timeout-minutes: 5 # this may need to increase over time but as a starter anything longer is hanging
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-build-${{ env.CACHE_NAME }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.CACHE_NAME }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Get node version
        run: node --version
      - name: Install dependencies
        id: install-deps
        run: yarn install
      - name: Run tests
        id: run-tests
        run: yarn test:ci
      - name: Upload coverage to Qlty
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.CC_TEST_REPORTER_ID }}
          files: ${{github.workspace}}/coverage/lcov.info
      - name: Upload coverage reports to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{github.workspace}}/coverage/
